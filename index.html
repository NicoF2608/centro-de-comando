    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coronados de Gloria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #111827; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal, .tab-content { transition: opacity 0.3s ease; }
        .tab-btn.active, .caja-tab-btn.active { border-color: #f59e0b; color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); }
        .btn-loading { position: relative; pointer-events: none; color: transparent !important; }
        .btn-loading::after {
            content: ''; position: absolute; left: 50%; top: 50%; width: 20px; height: 20px;
            margin-left: -10px; margin-top: -10px; border: 2px solid #111827; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #global-loader { background-color: rgba(17, 24, 39, 0.95); backdrop-filter: blur(8px); }
        .hide-sensitive .sensitive-data { filter: blur(6px); user-select: none; }
        .kpi-card { transition: transform 0.2s, box-shadow 0.2s; }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3); }
        
        /* Custom styles for dark inputs */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">
    <!-- Global loader for initial data fetching -->
    <div id="global-loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
        <p id="loader-text" class="mt-6 text-lg font-bold text-amber-500 tracking-widest uppercase">Forjando la Gloria...</p>
    </div>

    <!-- Main application container -->
    <div id="app-container" class="container mx-auto p-4 md:p-8 max-w-7xl opacity-0 transition-opacity duration-500">
        <header class="relative text-center mb-10 mt-4">
            <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-500 to-yellow-600 tracking-tight uppercase drop-shadow-sm" style="font-family: 'Arial Black', Impact, sans-serif;">
                Coronados de Gloria
            </h1>
            <p class="text-gray-400 mt-3 font-bold tracking-[0.2em] text-sm md:text-base">ENTRENAMIENTO INTELIGENTE</p>
            
            <button id="toggle-sensitive-btn" title="Ocultar/Mostrar datos sensibles" class="absolute top-0 right-0 p-3 text-gray-500 hover:text-amber-500 bg-gray-800 rounded-full shadow-lg border border-gray-700 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500">
                <svg id="eye-open-icon" class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                <svg id="eye-closed-icon" class="h-6 w-6 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 .946-3.11 3.558-5.448 6.84-6.195M15 12a3 3 0 11-6 0 3 3 0 016 0zm6.166-3.166a10.038 10.038 0 012.374 3.166C20.268 16.057 16.477 19 12 19c-1.353 0-2.65-.24-3.855-.684M3 3l18 18" /></svg>
            </button>
        </header>

        <!-- Tab navigation -->
        <div class="mb-8">
            <div class="border-b border-gray-700">
                <nav class="-mb-px flex space-x-2 sm:space-x-4 overflow-x-auto no-scrollbar" aria-label="Tabs">
                    <button data-tab="dashboard" class="tab-btn active shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm transition-colors text-gray-400 hover:text-gray-200">Panel</button>
                    <button data-tab="clientes" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Clientes</button>
                    <button data-tab="asistencias" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Asistencias</button>
                    <button data-tab="caja" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Caja</button>
                    <button data-tab="servicios" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Servicios</button>
                    <button data-tab="config" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Configuración</button>
                    <button data-tab="estadisticas" class="tab-btn text-gray-400 hover:text-gray-200 shrink-0 py-3 px-4 sm:px-5 border-b-2 font-medium text-sm border-transparent transition-colors">Estadísticas</button>
                </nav>
            </div>
        </div>
        
        <div id="content-container"></div>
    </div>

    <!-- Modals -->
    <div id="message-modal" class="modal fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 backdrop-blur-sm"><div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-2xl text-center max-w-sm w-full"><p id="modal-message-text" class="text-lg text-gray-100"></p><button id="close-message-modal" class="mt-6 w-full bg-amber-500 text-gray-900 font-bold px-4 py-3 rounded-lg hover:bg-amber-400 transition-colors">Cerrar</button></div></div>
    <div id="form-modal" class="modal fixed inset-0 bg-black/80 hidden items-center justify-center z-40 overflow-y-auto p-4 backdrop-blur-sm"><div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-2xl w-full max-w-2xl m-auto"><h2 id="form-modal-title" class="text-2xl font-bold text-amber-500 mb-6 uppercase tracking-wide"></h2><form id="main-form" class="space-y-4"></form></div></div>
    <div id="confirm-modal" class="modal fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 backdrop-blur-sm"><div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-2xl text-center max-w-sm w-full"><p id="confirm-modal-text" class="text-lg text-gray-100"></p><div class="flex justify-center space-x-4 mt-6"><button id="confirm-cancel-btn" class="bg-gray-700 text-gray-200 font-bold py-2 px-6 rounded-lg hover:bg-gray-600 transition-colors">Cancelar</button><button id="confirm-ok-btn" class="bg-red-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-red-500 transition-colors">Confirmar</button></div></div></div>
    <div id="passcode-modal" class="modal fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 backdrop-blur-sm"><div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl w-full max-w-sm"><div class="flex justify-center mb-4"><svg class="w-12 h-12 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div><h2 class="text-2xl font-bold text-gray-100 mb-2 text-center uppercase tracking-wide">Acceso a Caja</h2><p class="text-center text-gray-400 mb-6">Ingresá tu código de seguridad.</p><form id="passcode-form"><input type="password" id="passcode-input" class="w-full p-4 text-center text-3xl tracking-[0.5em] bg-gray-900 border-gray-700 border-2 rounded-xl text-amber-500 focus:ring-amber-500 focus:border-amber-500 outline-none" required><p id="passcode-error" class="text-red-400 text-sm text-center mt-3 h-4 font-semibold"></p><div class="flex justify-end space-x-4 mt-8"><button type="button" id="passcode-cancel-btn" class="bg-gray-700 text-gray-200 font-bold py-3 px-6 rounded-lg hover:bg-gray-600 transition-colors w-1/2">Cancelar</button><button type="submit" class="bg-amber-500 text-gray-900 font-bold py-3 px-6 rounded-lg hover:bg-amber-400 transition-colors w-1/2">Entrar</button></div></form></div></div>

    <!-- Application Logic -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvXjhpyJShf753-L3BJYrxQMVG59oJIGBMtvu4JyNvJr1ji9js9n1SwAWCqBJ8vLJn5A/exec";
        const state = { clientes: [], servicios: [], gastos: [], pagos: [], categoriasGastos: [], asistencias: [], clientFilter: null, isSensitiveHidden: localStorage.getItem('hideSensitive') === 'true', cajaUnlocked: false };
        
        // CSS Class variable for all forms to keep consistency in Dark Mode
        const inputClass = "w-full p-3 bg-gray-900 border border-gray-600 rounded-lg mt-1 text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent focus:outline-none placeholder-gray-500 transition-shadow";

        const dom = {
            globalLoader: document.getElementById('global-loader'), loaderText: document.getElementById('loader-text'), appContainer: document.getElementById('app-container'),
            contentContainer: document.getElementById('content-container'),
            tabs: document.querySelectorAll('.tab-btn'),
            modals: { message: document.getElementById('message-modal'), form: document.getElementById('form-modal'), confirm: document.getElementById('confirm-modal'), passcode: document.getElementById('passcode-modal') },
            modalMessageText: document.getElementById('modal-message-text'),
            formModalTitle: document.getElementById('form-modal-title'), mainForm: document.getElementById('main-form'),
            confirmModalText: document.getElementById('confirm-modal-text'), confirmOkBtn: document.getElementById('confirm-ok-btn'), confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
            toggleSensitiveBtn: document.getElementById('toggle-sensitive-btn'), eyeOpenIcon: document.getElementById('eye-open-icon'), eyeClosedIcon: document.getElementById('eye-closed-icon'),
            passcodeForm: document.getElementById('passcode-form'), passcodeError: document.getElementById('passcode-error'), passcodeCancelBtn: document.getElementById('passcode-cancel-btn'),
        };

        const app = {
            init: async () => {
                try {
                    Chart.register(ChartDataLabels);
                    Chart.defaults.color = '#9ca3af'; // Global text color for charts
                    Chart.defaults.set('plugins.datalabels', { display: false });

                    await app.fetchInitialData();
                    app.setupStaticListeners();
                    app.renderTabContent('dashboard');
                    app.updateSensitiveVisibility();
                    dom.globalLoader.classList.add('hidden');
                    dom.appContainer.classList.remove('opacity-0');
                } catch (error) { console.error("Initialization failed:", error); }
            },
            showModal(modal, msg = '') { if (modal === dom.modals.message && msg) dom.modalMessageText.textContent = msg; modal.classList.remove('hidden'); },
            hideModal(modal) { modal.classList.add('hidden'); },
            formatCurrency: amount => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(amount || 0),
            toISODateString: date => date ? new Date(new Date(date).getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0] : '',
            fetchWithTimeout: async (resource, options = {}, timeout = 30000) => { const c = new AbortController(); const id = setTimeout(() => c.abort(), timeout); const r = await fetch(resource, { ...options, signal: c.signal }); clearTimeout(id); return r; },
            postToSheet: async (action, payload) => { const r = await app.fetchWithTimeout(SCRIPT_URL, { method: 'POST', mode: 'cors', cache: 'no-cache', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, payload }) }); if (!r.ok) throw new Error(`Error de red: ${r.statusText}`); const result = await r.json(); if (result.result !== 'success') throw new Error(result.message || 'Error desconocido al guardar.'); return result; },
            fetchInitialData: async () => { try { const response = await app.fetchWithTimeout(SCRIPT_URL); if (!response.ok) throw new Error(`Error de Red: ${response.statusText}`); const result = await response.json(); if (result.result === 'success' && result.data) { Object.assign(state, result.data); } else { throw new Error(result.message || "La respuesta del script no tiene el formato esperado."); } } catch (error) { let msg = error.name === 'AbortError' ? "La conexión con Google Sheets tardó demasiado." : `No se pudo cargar: ${error.message}`; dom.loaderText.innerHTML = `<span class="text-red-500 font-bold">${msg}</span><p class="text-sm mt-2 text-gray-400">Verificá tu conexión y que el script de Google esté bien configurado.</p>`; dom.globalLoader.querySelector('.animate-spin').style.display = 'none'; throw error; } },
            saveCategoriesToSheet: async () => { try { await app.postToSheet('saveExpenseCategories', state.categoriasGastos); } catch (error) { app.showModal(dom.modals.message, `Error al guardar categorías: ${error.message}`); } },
            renderTabContent(tabName) { const renderFunction = this.render[tabName]; if (renderFunction) dom.contentContainer.innerHTML = renderFunction(); this.addDynamicListeners(tabName); this.updateSensitiveVisibility(); },
            renderAll() { const activeTab = document.querySelector('.tab-btn.active'); if (activeTab) { app.renderTabContent(activeTab.dataset.tab); } },
            render: {
                dashboard() {
                    const now = new Date(); now.setHours(0, 0, 0, 0);
                    const activeClients = state.clientes.filter(c => c.Estado === 'Activo').length;
                    
                    const expiringClients = state.clientes.filter(c => {
                        if (c.Estado !== 'Activo' || !c.FechaVencimientoCuota) return false;
                        const dueDate = new Date(c.FechaVencimientoCuota);
                        const diff = (dueDate - now) / (1000 * 60 * 60 * 24);
                        return diff >= 0 && diff <= 7;
                    });

                    const expiredClients = state.clientes.filter(c => c.Estado === 'Activo' && c.FechaVencimientoCuota && new Date(c.FechaVencimientoCuota) < now);

                    const monthlyRevenue = state.pagos
                        .filter(p => new Date(p.FechaPago).getMonth() === now.getMonth() && new Date(p.FechaPago).getFullYear() === now.getFullYear())
                        .reduce((sum, p) => sum + parseFloat(p.MontoPagado), 0);

                    let remindersHtml = '<div class="mt-8 bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl"><h3 class="text-xl font-bold mb-6 text-white uppercase tracking-wide border-b border-gray-700 pb-3">Recordatorios Pendientes</h3>';
                    const clientsToRemind = [...expiredClients, ...expiringClients];
                    if (clientsToRemind.length > 0) {
                        remindersHtml += '<ul class="space-y-3">';
                        clientsToRemind.forEach(client => {
                            const isExpired = new Date(client.FechaVencimientoCuota) < now;
                            remindersHtml += `<li class="flex items-center justify-between p-4 rounded-xl border ${isExpired ? 'bg-red-900/20 border-red-800/50' : 'bg-yellow-900/20 border-yellow-800/50'}">
                                <div>
                                    <p class="font-bold text-white text-lg">${client.Nombre} ${client.Apellido}</p>
                                    <p class="text-sm font-medium mt-1 flex items-center gap-1 ${isExpired ? 'text-red-400' : 'text-amber-400'}">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        Vence: ${new Date(client.FechaVencimientoCuota).toLocaleDateString('es-ES')}
                                    </p>
                                </div>
                                <button data-action="sendWhatsAppReminder" data-id="${client.ID_Cliente}" class="bg-emerald-600 text-white font-bold py-2 px-5 rounded-lg hover:bg-emerald-500 transition-colors flex items-center gap-2 shadow-lg shadow-emerald-900/50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
                                    <span>Recordar</span>
                                </button>
                            </li>`;
                        });
                        remindersHtml += '</ul>';
                    } else {
                        remindersHtml += '<div class="text-center py-10"><div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-700/50 mb-4"><svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div><p class="text-gray-400 font-medium">¡Todo al día! No hay recordatorios pendientes.</p></div>';
                    }
                    remindersHtml += '</div>';

                    return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <div data-action="filterClientes" data-filter="activos" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl kpi-card cursor-pointer">
                                    <div class="flex justify-between items-start"><h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider">Clientes Activos</h3><div class="p-2 bg-sky-900/30 rounded-lg"><svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div></div>
                                    <p class="text-4xl font-extrabold mt-4 text-white">${activeClients}</p>
                                </div>
                                <div data-action="filterClientes" data-filter="expiring" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl kpi-card cursor-pointer">
                                    <div class="flex justify-between items-start"><h3 class="text-amber-500 text-xs font-bold uppercase tracking-wider">Por Vencer (7d)</h3><div class="p-2 bg-amber-900/30 rounded-lg"><svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div></div>
                                    <p class="text-4xl font-extrabold mt-4 text-white">${expiringClients.length}</p>
                                </div>
                                <div data-action="filterClientes" data-filter="expired" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl kpi-card cursor-pointer">
                                    <div class="flex justify-between items-start"><h3 class="text-red-500 text-xs font-bold uppercase tracking-wider">Cuotas Vencidas</h3><div class="p-2 bg-red-900/30 rounded-lg"><svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div></div>
                                    <p class="text-4xl font-extrabold mt-4 text-white">${expiredClients.length}</p>
                                </div>
                                <div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl">
                                    <div class="flex justify-between items-start"><h3 class="text-emerald-500 text-xs font-bold uppercase tracking-wider">Ingresos Mes</h3><div class="p-2 bg-emerald-900/30 rounded-lg"><svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div></div>
                                    <p class="text-3xl font-extrabold mt-4 text-white sensitive-data">${app.formatCurrency(monthlyRevenue)}</p>
                                </div>
                            </div>
                            
                            <div class="mt-8 bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-xl">
                                <h3 class="text-xl font-bold mb-6 text-white uppercase tracking-wide border-b border-gray-700 pb-3">Accesos Rápidos</h3>
                                <div class="flex flex-wrap gap-4">
                                    <button data-action="openClientModal" class="bg-amber-600 text-gray-900 font-bold py-3 px-6 rounded-xl hover:bg-amber-500 transition-colors shadow-lg shadow-amber-900/20 flex items-center gap-2">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg> Nuevo Cliente
                                    </button>

                            <p id="balance-ingresos" class="text-4xl font-black text-white sensitive-data drop-shadow-md">_</p>
                        </div>
                        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl shadow-xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 -mr-4 -mt-4 w-24 h-24 bg-red-500/10 rounded-full blur-2xl"></div>
                            <h4 class="text-red-500 font-bold uppercase tracking-widest text-xs mb-2">Total Gastos</h4>
                            <p id="balance-gastos" class="text-4xl font-black text-white sensitive-data drop-shadow-md">_</p>
                        </div>
                        <div class="bg-gradient-to-br from-amber-600 to-yellow-700 border border-amber-500 p-8 rounded-2xl shadow-2xl shadow-amber-900/20 transform hover:-translate-y-1 transition-transform relative overflow-hidden">
                            <div class="absolute inset-0 bg-white/5 backdrop-blur-sm"></div>
                            <div class="relative z-10">
                                <h4 class="text-amber-100 font-bold uppercase tracking-widest text-xs mb-2">Balance Neto</h4>
                                <p id="balance-neto" class="text-5xl font-black text-gray-900 sensitive-data drop-shadow-sm">_</p>
                            </div>
                        </div>
                    </div>`;
            },
            calculateBalance() {
                const fromEl = document.getElementById('balance-date-from');
                const toEl = document.getElementById('balance-date-to');
                if(!fromEl || !toEl || !fromEl.value || !toEl.value) return;

                const from = new Date(fromEl.value + 'T00:00:00');
                const to = new Date(toEl.value + 'T23:59:59');

                const totalIngresos = state.pagos
                    .filter(p => { const d = new Date(p.FechaPago); return d >= from && d <= to; })
                    .reduce((sum, p) => sum + parseFloat(p.MontoPagado || 0), 0);
                
                const totalGastos = state.gastos
                    .filter(g => { const d = new Date(g.Fecha); return d >= from && d <= to; })
                    .reduce((sum, g) => sum + parseFloat(g.Monto || 0), 0);
                
                const balanceNeto = totalIngresos - totalGastos;

                document.getElementById('balance-ingresos').textContent = app.formatCurrency(totalIngresos);
                document.getElementById('balance-gastos').textContent = app.formatCurrency(totalGastos);
                document.getElementById('balance-neto').textContent = app.formatCurrency(balanceNeto);
                app.updateSensitiveVisibility();
            },
            renderPagosTable() {
                const today = app.toISODateString(new Date());
                const firstDay = app.toISODateString(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
                const fromDate = document.getElementById('ingresos-date-from')?.value || firstDay;
                const toDate = document.getElementById('ingresos-date-to')?.value || today;

                const from = new Date(fromDate + 'T00:00:00');
                const to = new Date(toDate + 'T23:59:59');

                const filteredPagos = state.pagos.filter(p => { const d = new Date(p.FechaPago); return d >= from && d <= to; });

                let c = `<div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                            <h2 class="text-3xl font-extrabold text-white tracking-tight">Ingresos</h2>
                            <div class="flex space-x-2 items-center bg-gray-900/50 p-2 rounded-xl border border-gray-700/50 w-full sm:w-auto">
                                <input type="date" id="ingresos-date-from" value="${fromDate}" class="bg-transparent text-gray-300 border-none focus:ring-0 text-sm font-bold uppercase tracking-wider cursor-pointer w-full">
                                <span class="text-amber-500 font-bold">-</span>
                                <input type="date" id="ingresos-date-to" value="${toDate}" class="bg-transparent text-gray-300 border-none focus:ring-0 text-sm font-bold uppercase tracking-wider cursor-pointer w-full">
                            </div>
                         </div>
                         <div class="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden shadow-xl"><div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead><tr class="bg-gray-950 border-b border-gray-700"><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Fecha</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Cliente</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Servicio</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Monto</th><th class="p-4 text-right text-gray-400 uppercase text-xs font-bold tracking-wider">Acciones</th></tr></thead><tbody>`;
                if (filteredPagos.length === 0) c += '<tr><td colspan="5" class="text-center text-gray-500 p-8 text-lg font-medium">No hay ingresos registrados en este período.</td></tr>';
                filteredPagos.sort((a, b) => new Date(b.FechaPago) - new Date(a.FechaPago)).forEach(p => { const cliente = state.clientes.find(cli => cli.ID_Cliente === p.ID_Cliente); const servicio = state.servicios.find(s => s.ID_Servicio === p.ID_Servicio); c += `<tr class="border-b border-gray-800 hover:bg-gray-800/50 transition-colors"><td class="p-4 text-gray-300 font-medium">${new Date(p.FechaPago).toLocaleDateString('es-ES')}</td><td class="p-4 font-bold text-gray-100">${cliente ? `${cliente.Nombre} ${cliente.Apellido}` : 'Desconocido'}</td><td class="p-4 text-gray-400 text-sm">${servicio ? servicio.NombreServicio : '-'}</td><td class="p-4 text-emerald-400 font-mono font-bold sensitive-data">${app.formatCurrency(p.MontoPagado)}</td><td class="p-4 text-right"><button data-action="openPaymentModal" data-id="${p.ID_Pago}" class="text-sky-500 hover:text-sky-400 font-bold transition-colors">Editar</button><button data-action="deletePayment" data-id="${p.ID_Pago}" class="text-red-500 hover:text-red-400 font-bold ml-4 transition-colors">Borrar</button></td></tr>`; }); c += `</tbody></table></div></div>`; return c;
            },
            renderGastosTable() {
                const today = app.toISODateString(new Date());
                const firstDay = app.toISODateString(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
                const fromDate = document.getElementById('gastos-date-from')?.value || firstDay;
                const toDate = document.getElementById('gastos-date-to')?.value || today;

                const from = new Date(fromDate + 'T00:00:00');
                const to = new Date(toDate + 'T23:59:59');

                const filteredGastos = state.gastos.filter(g => { const d = new Date(g.Fecha); return d >= from && d <= to; });

                let c = `<div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                            <h2 class="text-3xl font-extrabold text-white tracking-tight">Gastos</h2>
                            <div class="flex space-x-2 items-center bg-gray-900/50 p-2 rounded-xl border border-gray-700/50 w-full sm:w-auto">
                                <input type="date" id="gastos-date-from" value="${fromDate}" class="bg-transparent text-gray-300 border-none focus:ring-0 text-sm font-bold uppercase tracking-wider cursor-pointer w-full">
                                <span class="text-amber-500 font-bold">-</span>
                                <input type="date" id="gastos-date-to" value="${toDate}" class="bg-transparent text-gray-300 border-none focus:ring-0 text-sm font-bold uppercase tracking-wider cursor-pointer w-full">
                            </div>
                            <button data-action="openExpenseModal" class="bg-red-600 text-white font-bold py-3 px-5 rounded-xl hover:bg-red-500 transition-colors shrink-0 shadow-lg shadow-red-900/20 w-full sm:w-auto">Registrar Gasto</button>
                         </div>
                         <div class="bg-gray-900 rounded-2xl border border-gray-700 overflow-hidden shadow-xl"><div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead><tr class="bg-gray-950 border-b border-gray-700"><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Fecha</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Descripción</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Categoría</th><th class="p-4 text-gray-400 uppercase text-xs font-bold tracking-wider">Monto</th><th class="p-4 text-right text-gray-400 uppercase text-xs font-bold tracking-wider">Acciones</th></tr></thead><tbody>`;
                if (filteredGastos.length === 0) c += '<tr><td colspan="5" class="text-center text-gray-500 p-8 text-lg font-medium">No hay gastos registrados en este período.</td></tr>';
                filteredGastos.sort((a, b) => new Date(b.Fecha) - new Date(a.Fecha)).forEach(g => { c += `<tr class="border-b border-gray-800 hover:bg-gray-800/50 transition-colors"><td class="p-4 text-gray-300 font-medium">${new Date(g.Fecha).toLocaleDateString('es-ES')}</td><td class="p-4 font-bold text-gray-100">${g.Descripcion}</td><td class="p-4"><span class="px-2 py-1 bg-gray-800 rounded-md text-xs text-amber-500 border border-amber-900/30">${g.Categoria}</span></td><td class="p-4 text-red-400 font-mono font-bold sensitive-data">${app.formatCurrency(g.Monto)}</td><td class="p-4 text-right"><button data-action="openExpenseModal" data-id="${g.ID_Gasto}" class="text-sky-500 hover:text-sky-400 font-bold transition-colors">Editar</button><button data-action="deleteExpense" data-id="${g.ID_Gasto}" class="text-red-500 hover:text-red-400 font-bold ml-4 transition-colors">Borrar</button></td></tr>`; }); c += `</tbody></table></div></div>`; return c;
            }
        };

        app.actions = {
            openClientModal: ({ id }) => app.openClientModal(id),
            openServiceModal: ({ id }) => app.openServiceModal(id),
            openExpenseModal: ({ id }) => app.openExpenseModal(id),
            openPaymentModal: ({ id }) => { const payment = state.pagos.find(p => p.ID_Pago === id); if (payment) { app.openPaymentModal(payment.ID_Cliente, id); } else { app.openPaymentModal(id, null); } },
            deleteService: ({ id }) => app.confirmDelete('Servicios', 'ID_Servicio', id),
            deleteExpense: ({ id }) => app.confirmDelete('Gastos', 'ID_Gasto', id),
            deletePayment: ({ id }) => app.confirmDelete('Pagos', 'ID_Pago', id),
            deleteExpenseCategory: async ({ cat }) => { state.categoriasGastos = state.categoriasGastos.filter(c => c !== cat); await app.saveCategoriesToSheet(); app.renderAll(); },
            filterClientes: ({ filter }) => app.applyClientFilter(filter),
            clearClientFilter: () => { state.clientFilter = null; app.renderAll(); },
            markAttendance: async ({ id }) => {
                try {
                    const now = new Date();
                    await app.postToSheet('markAttendance', { ID_Cliente: id, FechaAsistencia: now.toISOString() });
                    await app.fetchInitialData();
                    app.showModal(dom.modals.message, "Asistencia registrada correctamente.");
                    if (document.querySelector('[data-tab="asistencias"].active')) {
                        const dateInput = document.getElementById('asistencia-date');
                        if (dateInput) app.renderAttendanceList(dateInput.value);
                    }
                } catch (e) {
                    app.showModal(dom.modals.message, `Error al registrar asistencia: ${e.message}`);
                }
            },
            sendWhatsAppReminder: ({id}) => {
                const client = state.clientes.find(c => c.ID_Cliente === id);
                if (!client || !String(client.Celular || '').trim()) {
                    app.showModal(dom.modals.message, "Atención: Este atleta no tiene un número de celular válido registrado.");
                    return;
                }
                const phone = String(client.Celular || '').replace(/[^0-9]/g, '');
                if (phone === '') {
                    app.showModal(dom.modals.message, "El formato del celular es inválido.");
                    return;
                }
                const fullPhone = phone.length > 8 ? phone : `549${phone}`;
                const dueDate = new Date(client.FechaVencimientoCuota).toLocaleDateString('es-ES');
                const message = encodeURIComponent(`Hola ${client.Nombre}, ¿cómo estás? Te escribo de parte de *Coronados de Gloria* para avisarte que tu cuota vence el día ${dueDate}.\n\n¡Sigamos entrenando inteligente! Que tengas un excelente día.`);
                const url = `https://wa.me/${fullPhone}?text=${message}`;
                window.open(url, '_blank');
            },
            exportStats: () => app.exportStatsToCSV(),
            calculateBalance: () => app.calculateBalance(),
            clearStatsFilters: () => {
                const statsContainer = document.getElementById('content-estadisticas');
                if (statsContainer) {
                    app.renderTabContent('estadisticas');
                }
            },
            generateAIObjectives: async ({ target }) => {
                const button = target;
                const objectivesTextarea = document.getElementById('form-objetivos');
                const notesTextarea = document.getElementById('form-notas');
                const userInput = objectivesTextarea.value;

                if (!userInput.trim()) {
                    app.showModal(dom.modals.message, 'Escribí una idea principal (ej: "Aumentar masa muscular") en el cuadro antes de pedirle ayuda a la IA.');
                    return;
                }
                
                button.classList.add('btn-loading');
                button.disabled = true;

                try {
                    const prompt = `Sos un entrenador personal experto y motivador del gimnasio "Coronados de Gloria". Un nuevo atleta te dice que su objetivo principal es "${userInput}". Basado en eso, generá un párrafo corto para el campo 'Objetivos' y otro párrafo corto para el campo 'Notas'.

                    - En 'Objetivos', detallá 2 o 3 metas SMART (específicas, medibles, alcanzables, relevantes, con plazo).
                    - En 'Notas', agregá un breve mensaje de bienvenida y motivación, y una recomendación inicial clave (ej. constancia, hidratación, descanso).
                    - Separar ambos párrafos estrictamente con los caracteres '---'.
                    - El tono debe ser profesional, cercano y alentador.
                    - Sé conciso y directo.
                    `;

                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const apiKey = "";
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    let response;
                    let retries = 5;
                    let delay = 1000;
                    
                    for (let i = 0; i < retries; i++) {
                        try {
                            response = await fetch(apiUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (response.ok) break;
                        } catch (e) {
                            if (i === retries - 1) throw e;
                        }
                        if (i < retries - 1) {
                            await new Promise(res => setTimeout(res, delay));
                            delay *= 2;
                        }
                    }
                    
                    if (!response || !response.ok) {
                        throw new Error("No se pudo conectar con la Inteligencia Artificial. Revisá tu conexión a internet e intentá nuevamente.");
                    }

                    const result = await response.json();
                    
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        const parts = text.split('---').map(s => s.trim());
                        const generatedObjectives = parts[0] || '';
                        const generatedNotes = parts[1] || '';
                        
                        if (generatedObjectives) {
                            objectivesTextarea.value = generatedObjectives;
                        }
                        if (generatedNotes) {
                            notesTextarea.value = generatedNotes;
                        }
                    } else {
                        throw new Error("La respuesta de la IA no fue válida.");
                    }
                } catch (error) {
                    app.showModal(dom.modals.message, `Oops: ${error.message}`);
                } finally {
                    button.classList.remove('btn-loading');
                    button.disabled = false;
                }
            }
        };

        app.init();
    });
    </script>
</body>
</html>
